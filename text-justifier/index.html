<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Justifier & Content Formatter</title>
    <style>
        :root {
            --primary-deep: #880e4f;
            --primary: #ad1457;
            --primary-medium: #c2185b;
            --primary-light: #e91e63;
            --accent: #f06292;
            --accent-light: #f8bbd0;
            --bg-start: #fce4ec;
            --bg-end: #fff5f8;
            --card-bg: #ffffff;
            --text: #2c1b22;
            --text-secondary: #5c4a52;
            --text-muted: #8a7a82;
            --border: #f0d4df;
            --border-light: #f8e5ed;
            --shadow-sm: 0 1px 3px rgba(136, 14, 79, 0.06), 0 1px 2px rgba(136, 14, 79, 0.04);
            --shadow-md: 0 4px 16px rgba(136, 14, 79, 0.08), 0 2px 6px rgba(136, 14, 79, 0.05);
            --shadow-lg: 0 8px 32px rgba(136, 14, 79, 0.10), 0 3px 10px rgba(136, 14, 79, 0.06);
            --shadow-pink: 0 4px 20px rgba(173, 20, 87, 0.13), 0 1px 4px rgba(173, 20, 87, 0.07);
            --radius-xs: 6px;
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 22px;
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(170deg, #fce4ec 0%, #fff5f8 25%, #fdf2f6 50%, #fef7fa 75%, #fce4ec 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #2c1b22;
            line-height: 1.6;
            padding: 20px 16px 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        body::before {
            content: '';
            position: fixed;
            top: -180px;
            right: -120px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(233, 30, 99, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 18s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -160px;
            left: -100px;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(240, 98, 146, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 22s ease-in-out infinite reverse;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(40px, -30px) scale(1.08); }
            50% { transform: translate(-20px, 25px) scale(0.94); }
            75% { transform: translate(30px, 15px) scale(1.05); }
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 820px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .app-header {
            text-align: center;
            padding: 8px 0 4px;
        }
        .app-header .logo-icon {
            display: inline-block;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #c2185b, #e91e63);
            border-radius: 16px;
            margin-bottom: 10px;
            box-shadow: 0 6px 22px rgba(194, 24, 91, 0.3);
            position: relative;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .app-header .logo-icon:hover {
            transform: scale(1.06) rotate(-2deg);
        }
        .app-header .logo-icon::after {
            content: 'T';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 24px;
        }
        .app-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #880e4f;
            letter-spacing: -0.4px;
            margin: 0;
        }
        .app-header .subtitle {
            font-size: 0.9rem;
            color: #8a7a82;
            margin-top: 2px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        .stat-card {
            background: #fff;
            border-radius: 14px;
            padding: 18px 14px 14px;
            text-align: center;
            box-shadow: 0 1px 3px rgba(136, 14, 79, 0.06);
            border: 1px solid #f8e5ed;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            box-shadow: 0 4px 20px rgba(173, 20, 87, 0.13);
            transform: translateY(-2px);
            border-color: #f8bbd0;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        .stat-card.words::before { background: linear-gradient(90deg, #e91e63, #f06292); }
        .stat-card.chars::before { background: linear-gradient(90deg, #c2185b, #e91e63); }
        .stat-card.sentences::before { background: linear-gradient(90deg, #ad1457, #d81b60); }
        .stat-card.paragraphs::before { background: linear-gradient(90deg, #880e4f, #c2185b); }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #880e4f;
            transition: 0.15s;
        }
        .stat-card .stat-label {
            font-size: 0.78rem;
            color: #8a7a82;
            font-weight: 500;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .section {
            background: #fff;
            border-radius: 18px;
            padding: 22px 24px;
            box-shadow: 0 4px 16px rgba(136, 14, 79, 0.08);
            border: 1px solid #f8e5ed;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #880e4f;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .section-label .label-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e91e63;
        }
        .word-limit-hint {
            font-size: 0.75rem;
            color: #8a7a82;
            margin-left: auto;
            text-transform: none;
            letter-spacing: 0;
            margin-right: 8px;
        }

        .btn-clear {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            font-size: 0.78rem;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            border: 2px solid #e91e63;
            background: #fff;
            color: #c2185b;
            transition: all 0.25s;
        }
        .btn-clear:hover {
            background: #fce4ec;
            border-color: #c2185b;
            transform: translateY(-1px);
        }

        .input-textarea {
            width: 100%;
            min-height: 240px;
            max-height: 520px;
            border: 2px solid #f0d4df;
            border-radius: 10px;
            padding: 16px 18px;
            font-size: 0.95rem;
            line-height: 1.7;
            background: #fefbfc;
            resize: vertical;
            outline: none;
            transition: 0.25s;
        }
        .input-textarea:focus {
            border-color: #e91e63;
            box-shadow: 0 0 0 4px rgba(233, 30, 99, 0.07);
            background: #fff;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-start;
        }
        .control-group.alignment-group {
            flex: 0 0 320px;
            max-width: 100%;
        }
        .control-group.toggle-group-wrapper {
            flex: 0 1 auto;
            min-width: 180px;
        }
        .control-label-text {
            font-weight: 600;
            font-size: 0.8rem;
            color: #5c4a52;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 7px;
            display: block;
        }

        .segmented-control {
            display: flex;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #f0d4df;
            background: #fefbfc;
        }
        .segmented-control input[type="radio"] { display: none; }
        .segmented-control label {
            flex: 1;
            text-align: center;
            padding: 10px 12px;
            font-size: 0.84rem;
            font-weight: 500;
            cursor: pointer;
            color: #5c4a52;
            transition: 0.25s;
            border-right: 1px solid #f8e5ed;
        }
        .segmented-control label:last-child { border-right: none; }
        .segmented-control label:hover { background: #fce4ec; color: #c2185b; }
        .segmented-control input[type="radio"]:checked+label {
            background: linear-gradient(135deg, #c2185b, #d81b60);
            color: #fff;
            font-weight: 600;
        }

        .toggle-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toggle-item {
            display: flex;
            align-items: center;
            gap: 11px;
            cursor: pointer;
        }
        .toggle-switch {
            position: relative;
            width: 48px;
            height: 27px;
        }
        .toggle-switch input { display: none; }
        .toggle-switch .slider {
            position: absolute;
            inset: 0;
            background: #d4c5cc;
            border-radius: 27px;
            transition: 0.25s;
        }
        .toggle-switch .slider::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 21px;
            height: 21px;
            background: #fff;
            border-radius: 50%;
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 6px rgba(0,0,0,0.16);
        }
        .toggle-switch input:checked+.slider {
            background: linear-gradient(135deg, #c2185b, #e91e63);
        }
        .toggle-switch input:checked+.slider::before {
            transform: translateX(21px);
        }

        .preview-container {
            border: 2px solid #f0d4df;
            border-radius: 10px;
            padding: 20px 22px;
            min-height: 140px;
            max-height: 500px;
            overflow-y: auto;
            background: #fffdfd;
            transition: 0.25s;
            word-wrap: break-word;
        }
        .preview-container:empty::before {
            content: 'Formatted preview will appear here...';
            color: #c9b8bf;
            font-style: italic;
        }
        .preview-container h1 { font-size: 1.7rem; color: #880e4f; border-bottom: 2px solid #f8bbd0; padding-bottom: 6px; margin: 18px 0 8px; }
        .preview-container h2 { font-size: 1.35rem; color: #ad1457; margin: 16px 0 6px; }
        .preview-container h3 { font-size: 1.1rem; color: #c2185b; margin: 12px 0 4px; }
        .preview-container p { margin: 6px 0; }

        .actions-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 13px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            transition: 0.25s;
            font-family: inherit;
        }
        .btn:active { transform: scale(0.96); }
        .btn-outline {
            background: #fff;
            color: #c2185b;
            border: 2px solid #e91e63;
        }
        .btn-outline:hover {
            background: #fce4ec;
            border-color: #c2185b;
            transform: translateY(-1px);
        }
        .btn-filled {
            background: linear-gradient(135deg, #c2185b, #d81b60);
            color: #fff;
        }
        .btn-filled:hover {
            background: linear-gradient(135deg, #ad1457, #c2185b);
            transform: translateY(-2px);
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2c1b22;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.88rem;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { background: #2e7d32; }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .actions-row { grid-template-columns: repeat(2, 1fr); }
            .controls-row { flex-direction: column; }
            .control-group.alignment-group { flex: 0 0 auto; width: 100%; }
            .control-group.toggle-group-wrapper { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-icon"></div>
            <h1>Text Justifier &amp; Content Formatter</h1>
            <p class="subtitle">Format, align, and structure your text beautifully</p>
        </header>

        <div class="stats-row">
            <div class="stat-card words"><span class="stat-value" id="wordCount">0</span><span class="stat-label">Words</span></div>
            <div class="stat-card chars"><span class="stat-value" id="charCount">0</span><span class="stat-label">Characters</span></div>
            <div class="stat-card sentences"><span class="stat-value" id="sentenceCount">0</span><span class="stat-label">Sentences</span></div>
            <div class="stat-card paragraphs"><span class="stat-value" id="paragraphCount">0</span><span class="stat-label">Paragraphs</span></div>
        </div>

        <div class="section">
            <div class="section-label">
                <span class="label-dot"></span> Input Text
                <span class="word-limit-hint">up to ~5000 words</span>
                <button class="btn-clear" id="clearBtn">🗑️ Clear All</button>
            </div>
            <textarea class="input-textarea" id="inputTextarea" placeholder="Type or paste your text here..."></textarea>
        </div>

        <div class="section">
            <div class="controls-row">
                <div class="control-group alignment-group">
                    <span class="control-label-text">Text Alignment</span>
                    <div class="segmented-control" id="alignmentGroup">
                        <input type="radio" name="textAlign" id="alignJustify" value="justify" checked>
                        <label for="alignJustify">Justify</label>
                        <input type="radio" name="textAlign" id="alignLeft" value="left">
                        <label for="alignLeft">Left</label>
                        <input type="radio" name="textAlign" id="alignCenter" value="center">
                        <label for="alignCenter">Center</label>
                        <input type="radio" name="textAlign" id="alignRight" value="right">
                        <label for="alignRight">Right</label>
                    </div>
                </div>
                <div class="control-group toggle-group-wrapper">
                    <span class="control-label-text">Formatting Options</span>
                    <div class="toggle-group">
                        <label class="toggle-item" for="autoHeadingToggle">
                            <div class="toggle-switch">
                                <input type="checkbox" id="autoHeadingToggle" checked>
                                <span class="slider"></span>
                            </div>
                            <span>Auto Heading Structure</span>
                        </label>
                        <label class="toggle-item" for="preserveBreaksToggle">
                            <div class="toggle-switch">
                                <input type="checkbox" id="preserveBreaksToggle" checked>
                                <span class="slider"></span>
                            </div>
                            <span>Preserve Line Breaks</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-label"><span class="label-dot"></span> Live Preview</div>
            <div class="preview-container" id="previewContainer"></div>
        </div>

        <div class="actions-row">
            <button class="btn btn-outline" id="copyHtmlBtn">📋 Copy as HTML</button>
            <button class="btn btn-outline" id="copyTextBtn">📝 Copy Output Text</button>
            <button class="btn btn-filled" id="downloadTxtBtn">⬇️ Download TXT</button>
            <button class="btn btn-filled" id="downloadHtmlBtn">⬇️ Download HTML</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const inputTextarea = document.getElementById('inputTextarea');
            const previewContainer = document.getElementById('previewContainer');
            const wordCountEl = document.getElementById('wordCount');
            const charCountEl = document.getElementById('charCount');
            const sentenceCountEl = document.getElementById('sentenceCount');
            const paragraphCountEl = document.getElementById('paragraphCount');
            const alignmentGroup = document.getElementById('alignmentGroup');
            const autoHeadingToggle = document.getElementById('autoHeadingToggle');
            const preserveBreaksToggle = document.getElementById('preserveBreaksToggle');
            const copyHtmlBtn = document.getElementById('copyHtmlBtn');
            const copyTextBtn = document.getElementById('copyTextBtn');
            const downloadTxtBtn = document.getElementById('downloadTxtBtn');
            const downloadHtmlBtn = document.getElementById('downloadHtmlBtn');
            const clearBtn = document.getElementById('clearBtn');
            const toast = document.getElementById('toast');

            let currentAlignment = 'justify';
            let autoHeadingEnabled = true;
            let preserveBreaksEnabled = true;
            let latestHtmlOutput = '';

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function showToast(msg, success = true) {
                toast.textContent = msg;
                toast.className = 'toast ' + (success ? 'success' : '');
                void toast.offsetWidth;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                    toast.className = 'toast';
                }, 2000);
            }

            function flashButton(btn) {
                btn.style.transform = 'scale(0.96)';
                setTimeout(() => btn.style.transform = '', 150);
            }

            function updateStatistics(text) {
                const words = text.trim() ? text.trim().split(/\s+/).filter(w => w.length > 0) : [];
                wordCountEl.textContent = words.length;
                charCountEl.textContent = text.length;
                const sentences = text.match(/[^.!?]+[.!?]+/g);
                sentenceCountEl.textContent = sentences ? sentences.length : (text.trim() ? 1 : 0);
                const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim());
                paragraphCountEl.textContent = paragraphs.length;
                [wordCountEl, charCountEl, sentenceCountEl, paragraphCountEl].forEach(el => {
                    el.style.transform = 'scale(1.08)';
                    setTimeout(() => el.style.transform = 'scale(1)', 150);
                });
            }

            function isHeadingLine(line) {
                const trimmed = line.trim();
                if (!trimmed) return { isHeading: false, level: 0 };
                const len = trimmed.length;
                const allCapsPattern = /^[A-Z\s\d\p{P}]+$/u;
                const isAllCaps = allCapsPattern.test(trimmed) && /[A-Z]{3,}/.test(trimmed);
                if (isAllCaps && len >= 6 && len <= 120) {
                    const wc = trimmed.split(/\s+/).filter(w => w.length > 1).length;
                    if (len <= 45 && wc <= 6) return { isHeading: true, level: 1 };
                    if (len <= 80) return { isHeading: true, level: 2 };
                    return { isHeading: true, level: 3 };
                }
                if (/^(Chapter|Part|Module|Unit|Lesson|Book|Volume)\s*[\d:.]*\s*/i.test(trimmed) && len <= 100) return { isHeading: true, level: 1 };
                if (/^(Section|Topic|Theme|Stage|Phase|Step)\s*[\d:.]*\s*/i.test(trimmed) && len <= 100) return { isHeading: true, level: 2 };
                const numMatch = trimmed.match(/^(\d+\.\d+\.\d+|\d+\.\d+|\d+\.|[IVX]+\.|[A-Z]\.)\s+\w{2,}/);
                if (numMatch && len <= 90) {
                    const depth = (trimmed.match(/\./g) || []).length;
                    if (depth >= 2) return { isHeading: true, level: 3 };
                    if (depth === 1 && /^\d+\.\d+/.test(trimmed)) return { isHeading: true, level: 2 };
                    return { isHeading: true, level: 2 };
                }
                const hasSentenceEnd = /[.!?]$/.test(trimmed);
                const wordCount = trimmed.split(/\s+/).filter(w => w.length > 1).length;
                if (!hasSentenceEnd && len <= 65 && wordCount >= 2 && wordCount <= 10) {
                    const titleCaseRatio = trimmed.split(/\s+/).filter(w => w.length > 1 && /^[A-Z]/.test(w) && !/^[A-Z]{2,}$/.test(w)).length / Math.max(wordCount, 1);
                    if (titleCaseRatio >= 0.5 && wordCount <= 8) return { isHeading: true, level: 3 };
                }
                if (isAllCaps && len >= 3 && len <= 50 && trimmed.split(/\s+/).length <= 4) return { isHeading: true, level: 1 };
                return { isHeading: false, level: 0 };
            }

            function formatTextToHtml(text, align, autoHead, preserveBr) {
                if (!text.trim()) return { html: '', plain: '' };
                const lines = text.split('\n');
                const blocks = [];
                let paraLines = [];
                let plainLines = [];

                function flushPara() {
                    if (paraLines.length === 0) return;
                    const paraText = paraLines.join(' ');
                    blocks.push({ type: 'p', html: `<p>${escapeHtml(paraText)}</p>`, plain: paraText });
                    plainLines.push(paraText);
                    paraLines = [];
                }

                for (let i = 0; i < lines.length; i++) {
                    const raw = lines[i];
                    const trimmed = raw.trim();
                    if (trimmed === '') {
                        flushPara();
                        plainLines.push('');
                        continue;
                    }
                    if (autoHead) {
                        const head = isHeadingLine(raw);
                        if (head.isHeading) {
                            flushPara();
                            const tag = 'h' + Math.min(head.level, 3);
                            blocks.push({ type: tag, html: `<${tag}>${escapeHtml(trimmed)}</${tag}>`, plain: trimmed });
                            plainLines.push(trimmed);
                            continue;
                        }
                    }
                    if (preserveBr) {
                        blocks.push({ type: 'br', html: `<span>${escapeHtml(trimmed)}</span><br>`, plain: trimmed });
                        plainLines.push(trimmed);
                    } else {
                        paraLines.push(trimmed);
                    }
                }
                if (!preserveBr) flushPara();

                let htmlBody = blocks.map(b => b.html).join('\n').replace(/(<br>\s*)+$/, '');
                const wrappedHtml = `<div style="text-align: ${align};">\n${htmlBody}\n</div>`;
                let plainOutput = plainLines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
                return { html: wrappedHtml, plain: plainOutput };
            }

            function updatePreview() {
                const text = inputTextarea.value;
                const result = formatTextToHtml(text, currentAlignment, autoHeadingEnabled, preserveBreaksEnabled);
                latestHtmlOutput = result.html;

                if (result.html) {
                    const innerMatch = result.html.match(/<div style="text-align:\s*[^"]*;">\n?([\s\S]*?)\n?<\/div>/);
                    previewContainer.innerHTML = innerMatch ? innerMatch[1] : result.html;
                    previewContainer.style.textAlign = currentAlignment;
                } else {
                    previewContainer.innerHTML = '';
                    previewContainer.style.textAlign = currentAlignment;
                }
                updateStatistics(text);
            }

            // 🔥 ULTIMATE FIX: Extract text exactly as rendered in preview
            function getPreviewText() {
                const container = previewContainer;
                let text = '';
                function processNode(node) {
                    if (node.nodeType === Node.TEXT_NODE) {
                        text += node.textContent;
                    } else if (node.nodeType === Node.ELEMENT_NODE) {
                        const tag = node.tagName.toLowerCase();
                        if (tag === 'br') {
                            text += '\n';
                        } else if (['h1', 'h2', 'h3', 'h4', 'h5', 'h6'].includes(tag)) {
                            text += node.textContent.trim() + '\n\n';
                        } else if (tag === 'p') {
                            text += node.textContent.trim() + '\n';
                        } else if (tag === 'div') {
                            // For any div, just process children
                            for (let child = node.firstChild; child; child = child.nextSibling) {
                                processNode(child);
                            }
                            text += '\n';
                        } else {
                            // span, etc.
                            for (let child = node.firstChild; child; child = child.nextSibling) {
                                processNode(child);
                            }
                        }
                    }
                }
                for (let child = container.firstChild; child; child = child.nextSibling) {
                    processNode(child);
                }
                // Clean up multiple newlines
                return text.replace(/\n{3,}/g, '\n\n').trim();
            }

            inputTextarea.addEventListener('input', updatePreview);
            clearBtn.addEventListener('click', () => {
                inputTextarea.value = '';
                updatePreview();
                inputTextarea.focus();
                showToast('✅ Text cleared!');
            });

            alignmentGroup.addEventListener('change', (e) => {
                if (e.target.name === 'textAlign') {
                    currentAlignment = e.target.value;
                    updatePreview();
                }
            });
            autoHeadingToggle.addEventListener('change', function() {
                autoHeadingEnabled = this.checked;
                updatePreview();
            });
            preserveBreaksToggle.addEventListener('change', function() {
                preserveBreaksEnabled = this.checked;
                updatePreview();
            });

            copyHtmlBtn.addEventListener('click', async () => {
                try {
                    const html = latestHtmlOutput || `<div style="text-align: ${currentAlignment};"></div>`;
                    await navigator.clipboard.writeText(html);
                    flashButton(copyHtmlBtn);
                    showToast('✅ HTML copied!');
                } catch (err) {
                    showToast('⚠️ Failed to copy HTML', false);
                }
            });

            copyTextBtn.addEventListener('click', async () => {
                try {
                    const formatted = getPreviewText();
                    await navigator.clipboard.writeText(formatted);
                    flashButton(copyTextBtn);
                    showToast('✅ Formatted output text copied!');
                } catch (err) {
                    showToast('⚠️ Failed to copy text', false);
                }
            });

            downloadTxtBtn.addEventListener('click', () => {
                const formatted = getPreviewText();
                const blob = new Blob([formatted], { type: 'text/plain;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'formatted-output.txt';
                a.click();
                flashButton(downloadTxtBtn);
                showToast('✅ Downloaded TXT!');
            });

            downloadHtmlBtn.addEventListener('click', () => {
                const html = latestHtmlOutput || `<div style="text-align: ${currentAlignment};"></div>`;
                const doc = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Formatted Output</title><style>body{font-family:Inter,system-ui,sans-serif;max-width:800px;margin:40px auto;padding:20px;line-height:1.7;color:#2c1b22}h1{color:#880e4f;border-bottom:2px solid #f8bbd0}h2{color:#ad1457}h3{color:#c2185b}p{margin:6px 0}</style></head><body>${html}</body></html>`;
                const blob = new Blob([doc], { type: 'text/html;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'formatted-output.html';
                a.click();
                flashButton(downloadHtmlBtn);
                showToast('✅ Downloaded HTML!');
            });

            // Init
            currentAlignment = document.querySelector('input[name="textAlign"]:checked')?.value || 'justify';
            updatePreview();
        })();
    </script>
</body>
</html>
